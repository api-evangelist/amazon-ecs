specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Amazon ECS
providerId: amazon-ecs
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - AWS
  - Containers
  - ECS
  - Cost Management
description: 'FOCUS-aligned FinOps for Amazon ECS: ECS API and orchestration are free; cost arises from
  the launch type (Fargate vCPU/memory-seconds, EC2 instance-hours, or ECS Managed Instance fees) and
  associated resources.'
sources:
  - https://aws.amazon.com/ecs/pricing/
  - https://aws.amazon.com/fargate/pricing/
  - https://aws.amazon.com/aws-cost-management/aws-cost-explorer/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Amazon Web Services, Inc.
serviceCategory: Compute / Containers
billingModel:
  pricingCategory: Pay-As-You-Go + Committed Use
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
focusColumns:
  ServiceName: Amazon Elastic Container Service
  ServiceCategory: Compute
  ServiceSubcategory: Containers
  ProviderName: AWS
  PublisherName: Amazon Web Services, Inc.
  InvoiceIssuerName: Amazon Web Services, Inc.
  BillingCurrency: USD
  ChargeCategory: Usage
  PricingCategory: On-Demand
meters:
  - name: fargate_vcpu_seconds
    unit: vCPU-second
    aggregation: sum
    dimensions:
      - region
      - cluster
      - service
      - task_definition
      - cpu_architecture
  - name: fargate_memory_seconds
    unit: GB-second
    aggregation: sum
    dimensions:
      - region
      - cluster
      - service
      - task_definition
  - name: ec2_instance_hours
    unit: instance-hour
    aggregation: sum
    dimensions:
      - region
      - instance_type
      - cluster
      - capacity_provider
  - name: managed_instance_fee
    unit: instance-hour
    aggregation: sum
    dimensions:
      - region
      - instance_type
  - name: data_transfer
    unit: GB
    aggregation: sum
    dimensions:
      - region
      - direction
principles:
  - name: Visibility
    description: Use AWS Cost Explorer with the ECS dimension, AWS CUR/CUR 2.0 (FOCUS export), and CloudWatch
      Container Insights to attribute spend to clusters, services, and tasks.
  - name: Allocation
    description: Apply user-defined tags (Environment, Team, Application) on clusters, services, and task
      definitions; enable cost allocation tags in Billing.
  - name: Optimization
    description: Pick the right launch type per workload (Fargate Spot, EC2 Spot via capacity providers),
      right-size CPU/memory in task definitions, use ARM/Graviton, commit to Compute Savings Plans for
      steady baseline.
  - name: Accountability
    description: Set AWS Budgets per account/tag, configure anomaly detection, hold service owners accountable
      via showback/chargeback from CUR.
maintainers:
