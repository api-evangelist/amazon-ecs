openapi: 3.1.0
info:
  title: Amazon Elastic Container Service (ECS) API
  description: >-
    Amazon Elastic Container Service (Amazon ECS) is a fully managed container
    orchestration service that makes it easy to deploy, manage, and scale
    containerized applications. The Amazon ECS API uses an RPC model where all
    actions are routed to a single endpoint via POST with an X-Amz-Target header
    specifying the action. This specification models the core ECS resource
    operations for clusters, services, tasks, and task definitions.
  version: '2014-11-13'
  contact:
    name: Amazon Web Services
    url: https://aws.amazon.com/ecs/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  x-apisguru-categories:
    - cloud
  x-logo:
    url: https://aws.amazon.com/favicon.ico
  x-origin:
    - format: openapi
      url: https://docs.aws.amazon.com/AmazonECS/latest/APIReference/Welcome.html
      version: '3.1'

externalDocs:
  description: Amazon ECS API Reference
  url: https://docs.aws.amazon.com/AmazonECS/latest/APIReference/Welcome.html

servers:
  - url: https://ecs.{region}.amazonaws.com
    description: Amazon ECS regional endpoint
    variables:
      region:
        default: us-east-1
        description: AWS region
        enum:
          - us-east-1
          - us-east-2
          - us-west-1
          - us-west-2
          - eu-west-1
          - eu-west-2
          - eu-west-3
          - eu-central-1
          - eu-north-1
          - ap-southeast-1
          - ap-southeast-2
          - ap-northeast-1
          - ap-northeast-2
          - ap-south-1
          - sa-east-1
          - ca-central-1

security:
  - aws_sig_v4: []

tags:
  - name: Clusters
    description: Operations for managing ECS clusters
    externalDocs:
      url: https://docs.aws.amazon.com/AmazonECS/latest/APIReference/API_CreateCluster.html
  - name: Services
    description: Operations for managing ECS services
    externalDocs:
      url: https://docs.aws.amazon.com/AmazonECS/latest/APIReference/API_CreateService.html
  - name: Tasks
    description: Operations for running and managing ECS tasks
    externalDocs:
      url: https://docs.aws.amazon.com/AmazonECS/latest/APIReference/API_RunTask.html
  - name: Task Definitions
    description: Operations for managing ECS task definitions
    externalDocs:
      url: https://docs.aws.amazon.com/AmazonECS/latest/APIReference/API_RegisterTaskDefinition.html
  - name: Container Instances
    description: Operations for managing container instances
  - name: Capacity Providers
    description: Operations for managing capacity providers

paths:
  /#X-Amz-Target=AmazonEC2ContainerServiceV20141113.CreateCluster:
    post:
      operationId: CreateCluster
      summary: Create a new ECS cluster
      description: >-
        Creates a new Amazon ECS cluster. By default, your account receives a
        default cluster when you launch your first container instance. You can
        create additional clusters to group resources.
      tags:
        - Clusters
      externalDocs:
        url: https://docs.aws.amazon.com/AmazonECS/latest/APIReference/API_CreateCluster.html
      parameters:
        - $ref: '#/components/parameters/X-Amz-Target'
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              $ref: '#/components/schemas/CreateClusterRequest'
      responses:
        '200':
          description: Cluster created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateClusterResponse'
        '400':
          $ref: '#/components/responses/ClientError'
        '500':
          $ref: '#/components/responses/ServerError'

  /#X-Amz-Target=AmazonEC2ContainerServiceV20141113.DeleteCluster:
    post:
      operationId: DeleteCluster
      summary: Delete an ECS cluster
      description: >-
        Deletes the specified cluster. The cluster must have been deregistered,
        and must not contain any services or tasks.
      tags:
        - Clusters
      externalDocs:
        url: https://docs.aws.amazon.com/AmazonECS/latest/APIReference/API_DeleteCluster.html
      parameters:
        - $ref: '#/components/parameters/X-Amz-Target'
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              required:
                - cluster
              properties:
                cluster:
                  type: string
                  description: The short name or full ARN of the cluster to delete.
      responses:
        '200':
          description: Cluster deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  cluster:
                    $ref: '#/components/schemas/Cluster'
        '400':
          $ref: '#/components/responses/ClientError'
        '500':
          $ref: '#/components/responses/ServerError'

  /#X-Amz-Target=AmazonEC2ContainerServiceV20141113.DescribeClusters:
    post:
      operationId: DescribeClusters
      summary: Describe one or more ECS clusters
      description: >-
        Describes one or more of your clusters. Returns details about a cluster
        including its status, statistics, tags, and settings.
      tags:
        - Clusters
      externalDocs:
        url: https://docs.aws.amazon.com/AmazonECS/latest/APIReference/API_DescribeClusters.html
      parameters:
        - $ref: '#/components/parameters/X-Amz-Target'
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                clusters:
                  type: array
                  description: >-
                    A list of up to 100 cluster names or full cluster ARN
                    entries.
                  items:
                    type: string
                include:
                  type: array
                  description: Additional information about your clusters to include in the response.
                  items:
                    type: string
                    enum:
                      - ATTACHMENTS
                      - CONFIGURATIONS
                      - SETTINGS
                      - STATISTICS
                      - TAGS
      responses:
        '200':
          description: Clusters described successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  clusters:
                    type: array
                    items:
                      $ref: '#/components/schemas/Cluster'
                  failures:
                    type: array
                    items:
                      $ref: '#/components/schemas/Failure'
        '400':
          $ref: '#/components/responses/ClientError'
        '500':
          $ref: '#/components/responses/ServerError'

  /#X-Amz-Target=AmazonEC2ContainerServiceV20141113.ListClusters:
    post:
      operationId: ListClusters
      summary: List ECS clusters
      description: Returns a list of existing clusters.
      tags:
        - Clusters
      externalDocs:
        url: https://docs.aws.amazon.com/AmazonECS/latest/APIReference/API_ListClusters.html
      parameters:
        - $ref: '#/components/parameters/X-Amz-Target'
      requestBody:
        required: false
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                maxResults:
                  type: integer
                  description: Maximum number of cluster results per page (1-100).
                nextToken:
                  type: string
                  description: Pagination token from a previous response.
      responses:
        '200':
          description: Clusters listed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  clusterArns:
                    type: array
                    items:
                      type: string
                  nextToken:
                    type: string
        '400':
          $ref: '#/components/responses/ClientError'
        '500':
          $ref: '#/components/responses/ServerError'

  /#X-Amz-Target=AmazonEC2ContainerServiceV20141113.UpdateCluster:
    post:
      operationId: UpdateCluster
      summary: Update an ECS cluster
      description: Updates the cluster settings and configuration.
      tags:
        - Clusters
      externalDocs:
        url: https://docs.aws.amazon.com/AmazonECS/latest/APIReference/API_UpdateCluster.html
      parameters:
        - $ref: '#/components/parameters/X-Amz-Target'
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              required:
                - cluster
              properties:
                cluster:
                  type: string
                  description: The name or ARN of the cluster to update.
                settings:
                  type: array
                  items:
                    $ref: '#/components/schemas/ClusterSetting'
                configuration:
                  $ref: '#/components/schemas/ClusterConfiguration'
                serviceConnectDefaults:
                  $ref: '#/components/schemas/ClusterServiceConnectDefaults'
      responses:
        '200':
          description: Cluster updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  cluster:
                    $ref: '#/components/schemas/Cluster'
        '400':
          $ref: '#/components/responses/ClientError'
        '500':
          $ref: '#/components/responses/ServerError'

  /#X-Amz-Target=AmazonEC2ContainerServiceV20141113.CreateService:
    post:
      operationId: CreateService
      summary: Create a new ECS service
      description: >-
        Runs and maintains a specified number of instances of a task definition
        simultaneously in an ECS cluster. If the desired count of tasks in a
        service drops below the desired count, Amazon ECS runs another
        instantiation of the task to bring the count back up.
      tags:
        - Services
      externalDocs:
        url: https://docs.aws.amazon.com/AmazonECS/latest/APIReference/API_CreateService.html
      parameters:
        - $ref: '#/components/parameters/X-Amz-Target'
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              $ref: '#/components/schemas/CreateServiceRequest'
      responses:
        '200':
          description: Service created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    $ref: '#/components/schemas/Service'
        '400':
          $ref: '#/components/responses/ClientError'
        '500':
          $ref: '#/components/responses/ServerError'

  /#X-Amz-Target=AmazonEC2ContainerServiceV20141113.DeleteService:
    post:
      operationId: DeleteService
      summary: Delete an ECS service
      description: >-
        Deletes a specified service within a cluster. You can delete a service if
        you have no running tasks in it and the desired task count is zero.
      tags:
        - Services
      externalDocs:
        url: https://docs.aws.amazon.com/AmazonECS/latest/APIReference/API_DeleteService.html
      parameters:
        - $ref: '#/components/parameters/X-Amz-Target'
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              required:
                - service
              properties:
                cluster:
                  type: string
                  description: The short name or full ARN of the cluster hosting the service.
                service:
                  type: string
                  description: The name or ARN of the service to delete.
                force:
                  type: boolean
                  description: >-
                    If true, you can delete a service even if it has not been
                    scaled down to zero tasks.
      responses:
        '200':
          description: Service deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    $ref: '#/components/schemas/Service'
        '400':
          $ref: '#/components/responses/ClientError'
        '500':
          $ref: '#/components/responses/ServerError'

  /#X-Amz-Target=AmazonEC2ContainerServiceV20141113.DescribeServices:
    post:
      operationId: DescribeServices
      summary: Describe one or more ECS services
      description: Describes the specified services running in a cluster.
      tags:
        - Services
      externalDocs:
        url: https://docs.aws.amazon.com/AmazonECS/latest/APIReference/API_DescribeServices.html
      parameters:
        - $ref: '#/components/parameters/X-Amz-Target'
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              required:
                - services
              properties:
                cluster:
                  type: string
                  description: The short name or full ARN of the cluster hosting the services.
                services:
                  type: array
                  description: A list of services to describe (up to 10).
                  items:
                    type: string
                  maxItems: 10
                include:
                  type: array
                  description: Additional information to include in the response.
                  items:
                    type: string
                    enum:
                      - TAGS
      responses:
        '200':
          description: Services described successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  services:
                    type: array
                    items:
                      $ref: '#/components/schemas/Service'
                  failures:
                    type: array
                    items:
                      $ref: '#/components/schemas/Failure'
        '400':
          $ref: '#/components/responses/ClientError'
        '500':
          $ref: '#/components/responses/ServerError'

  /#X-Amz-Target=AmazonEC2ContainerServiceV20141113.ListServices:
    post:
      operationId: ListServices
      summary: List ECS services
      description: Returns a list of services in a specified cluster.
      tags:
        - Services
      externalDocs:
        url: https://docs.aws.amazon.com/AmazonECS/latest/APIReference/API_ListServices.html
      parameters:
        - $ref: '#/components/parameters/X-Amz-Target'
      requestBody:
        required: false
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                cluster:
                  type: string
                  description: The short name or full ARN of the cluster.
                maxResults:
                  type: integer
                  description: Maximum number of service results per page (1-100).
                nextToken:
                  type: string
                  description: Pagination token from a previous response.
                launchType:
                  type: string
                  enum:
                    - EC2
                    - FARGATE
                    - EXTERNAL
                  description: Filter services by launch type.
                schedulingStrategy:
                  type: string
                  enum:
                    - REPLICA
                    - DAEMON
                  description: Filter services by scheduling strategy.
      responses:
        '200':
          description: Services listed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  serviceArns:
                    type: array
                    items:
                      type: string
                  nextToken:
                    type: string
        '400':
          $ref: '#/components/responses/ClientError'
        '500':
          $ref: '#/components/responses/ServerError'

  /#X-Amz-Target=AmazonEC2ContainerServiceV20141113.UpdateService:
    post:
      operationId: UpdateService
      summary: Update an ECS service
      description: >-
        Modifies the parameters of a service. Changes take effect in a rolling
        update fashion depending on the deployment configuration.
      tags:
        - Services
      externalDocs:
        url: https://docs.aws.amazon.com/AmazonECS/latest/APIReference/API_UpdateService.html
      parameters:
        - $ref: '#/components/parameters/X-Amz-Target'
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              required:
                - service
              properties:
                cluster:
                  type: string
                  description: The short name or full ARN of the cluster hosting the service.
                service:
                  type: string
                  description: The name or ARN of the service to update.
                taskDefinition:
                  type: string
                  description: The family and revision or full ARN of the task definition.
                desiredCount:
                  type: integer
                  description: The number of instantiations of the task to place and keep running.
                deploymentConfiguration:
                  $ref: '#/components/schemas/DeploymentConfiguration'
                networkConfiguration:
                  $ref: '#/components/schemas/NetworkConfiguration'
                capacityProviderStrategy:
                  type: array
                  items:
                    $ref: '#/components/schemas/CapacityProviderStrategyItem'
                placementConstraints:
                  type: array
                  items:
                    $ref: '#/components/schemas/PlacementConstraint'
                placementStrategy:
                  type: array
                  items:
                    $ref: '#/components/schemas/PlacementStrategy'
                platformVersion:
                  type: string
                  description: The platform version for Fargate tasks.
                forceNewDeployment:
                  type: boolean
                  description: >-
                    Whether to force a new deployment of the service.
                healthCheckGracePeriodSeconds:
                  type: integer
                  description: Health check grace period in seconds.
                enableExecuteCommand:
                  type: boolean
                  description: Whether to enable Amazon ECS Exec.
                enableECSManagedTags:
                  type: boolean
                loadBalancers:
                  type: array
                  items:
                    $ref: '#/components/schemas/LoadBalancer'
                propagateTags:
                  type: string
                  enum:
                    - TASK_DEFINITION
                    - SERVICE
                    - NONE
                serviceConnectConfiguration:
                  $ref: '#/components/schemas/ServiceConnectConfiguration'
                serviceRegistries:
                  type: array
                  items:
                    $ref: '#/components/schemas/ServiceRegistry'
      responses:
        '200':
          description: Service updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    $ref: '#/components/schemas/Service'
        '400':
          $ref: '#/components/responses/ClientError'
        '500':
          $ref: '#/components/responses/ServerError'

  /#X-Amz-Target=AmazonEC2ContainerServiceV20141113.RegisterTaskDefinition:
    post:
      operationId: RegisterTaskDefinition
      summary: Register a new task definition
      description: >-
        Registers a new task definition from the supplied family and container
        definitions. You can also register task definitions with a volumes
        parameter for data volumes used by the task containers.
      tags:
        - Task Definitions
      externalDocs:
        url: https://docs.aws.amazon.com/AmazonECS/latest/APIReference/API_RegisterTaskDefinition.html
      parameters:
        - $ref: '#/components/parameters/X-Amz-Target'
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              $ref: '#/components/schemas/RegisterTaskDefinitionRequest'
      responses:
        '200':
          description: Task definition registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  taskDefinition:
                    $ref: '#/components/schemas/TaskDefinition'
                  tags:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tag'
        '400':
          $ref: '#/components/responses/ClientError'
        '500':
          $ref: '#/components/responses/ServerError'

  /#X-Amz-Target=AmazonEC2ContainerServiceV20141113.DeregisterTaskDefinition:
    post:
      operationId: DeregisterTaskDefinition
      summary: Deregister a task definition
      description: >-
        Deregisters the specified task definition by family and revision. Upon
        deregistration, the task definition is marked as INACTIVE.
      tags:
        - Task Definitions
      externalDocs:
        url: https://docs.aws.amazon.com/AmazonECS/latest/APIReference/API_DeregisterTaskDefinition.html
      parameters:
        - $ref: '#/components/parameters/X-Amz-Target'
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              required:
                - taskDefinition
              properties:
                taskDefinition:
                  type: string
                  description: >-
                    The family and revision (family:revision) or full ARN of the
                    task definition to deregister.
      responses:
        '200':
          description: Task definition deregistered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  taskDefinition:
                    $ref: '#/components/schemas/TaskDefinition'
        '400':
          $ref: '#/components/responses/ClientError'
        '500':
          $ref: '#/components/responses/ServerError'

  /#X-Amz-Target=AmazonEC2ContainerServiceV20141113.DescribeTaskDefinition:
    post:
      operationId: DescribeTaskDefinition
      summary: Describe a task definition
      description: >-
        Describes a task definition. You can specify a family and revision to
        find information about a specific task definition, or you can simply
        specify the family to find the latest ACTIVE revision in that family.
      tags:
        - Task Definitions
      externalDocs:
        url: https://docs.aws.amazon.com/AmazonECS/latest/APIReference/API_DescribeTaskDefinition.html
      parameters:
        - $ref: '#/components/parameters/X-Amz-Target'
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              required:
                - taskDefinition
              properties:
                taskDefinition:
                  type: string
                  description: >-
                    The family and revision or full ARN of the task definition to
                    describe.
                include:
                  type: array
                  items:
                    type: string
                    enum:
                      - TAGS
      responses:
        '200':
          description: Task definition described successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  taskDefinition:
                    $ref: '#/components/schemas/TaskDefinition'
                  tags:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tag'
        '400':
          $ref: '#/components/responses/ClientError'
        '500':
          $ref: '#/components/responses/ServerError'

  /#X-Amz-Target=AmazonEC2ContainerServiceV20141113.ListTaskDefinitions:
    post:
      operationId: ListTaskDefinitions
      summary: List task definitions
      description: >-
        Returns a list of task definitions that are registered to your account.
        You can filter by family name to find all revisions for a specific
        family.
      tags:
        - Task Definitions
      externalDocs:
        url: https://docs.aws.amazon.com/AmazonECS/latest/APIReference/API_ListTaskDefinitions.html
      parameters:
        - $ref: '#/components/parameters/X-Amz-Target'
      requestBody:
        required: false
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                familyPrefix:
                  type: string
                  description: Filter by family name prefix.
                status:
                  type: string
                  enum:
                    - ACTIVE
                    - INACTIVE
                    - DELETE_IN_PROGRESS
                  description: Filter by task definition status.
                sort:
                  type: string
                  enum:
                    - ASC
                    - DESC
                  description: Sort order for results.
                maxResults:
                  type: integer
                  description: Maximum number of results per page (1-100).
                nextToken:
                  type: string
                  description: Pagination token from a previous response.
      responses:
        '200':
          description: Task definitions listed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  taskDefinitionArns:
                    type: array
                    items:
                      type: string
                  nextToken:
                    type: string
        '400':
          $ref: '#/components/responses/ClientError'
        '500':
          $ref: '#/components/responses/ServerError'

  /#X-Amz-Target=AmazonEC2ContainerServiceV20141113.ListTaskDefinitionFamilies:
    post:
      operationId: ListTaskDefinitionFamilies
      summary: List task definition families
      description: >-
        Returns a list of task definition families that are registered to your
        account, with ACTIVE task definitions.
      tags:
        - Task Definitions
      externalDocs:
        url: https://docs.aws.amazon.com/AmazonECS/latest/APIReference/API_ListTaskDefinitionFamilies.html
      parameters:
        - $ref: '#/components/parameters/X-Amz-Target'
      requestBody:
        required: false
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                familyPrefix:
                  type: string
                  description: Filter by family name prefix.
                status:
                  type: string
                  enum:
                    - ACTIVE
                    - INACTIVE
                    - ALL
                maxResults:
                  type: integer
                nextToken:
                  type: string
      responses:
        '200':
          description: Task definition families listed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  families:
                    type: array
                    items:
                      type: string
                  nextToken:
                    type: string
        '400':
          $ref: '#/components/responses/ClientError'
        '500':
          $ref: '#/components/responses/ServerError'

  /#X-Amz-Target=AmazonEC2ContainerServiceV20141113.RunTask:
    post:
      operationId: RunTask
      summary: Run a new task
      description: >-
        Starts a new task using the specified task definition. You can specify
        the cluster, launch type, network configuration, and overrides.
      tags:
        - Tasks
      externalDocs:
        url: https://docs.aws.amazon.com/AmazonECS/latest/APIReference/API_RunTask.html
      parameters:
        - $ref: '#/components/parameters/X-Amz-Target'
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              $ref: '#/components/schemas/RunTaskRequest'
      responses:
        '200':
          description: Task started successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunTaskResponse'
        '400':
          $ref: '#/components/responses/ClientError'
        '500':
          $ref: '#/components/responses/ServerError'

  /#X-Amz-Target=AmazonEC2ContainerServiceV20141113.StartTask:
    post:
      operationId: StartTask
      summary: Start a task on a specific container instance
      description: >-
        Starts a new task from the specified task definition on the specified
        container instance or instances.
      tags:
        - Tasks
      externalDocs:
        url: https://docs.aws.amazon.com/AmazonECS/latest/APIReference/API_StartTask.html
      parameters:
        - $ref: '#/components/parameters/X-Amz-Target'
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              required:
                - taskDefinition
                - containerInstances
              properties:
                cluster:
                  type: string
                taskDefinition:
                  type: string
                  description: The family and revision or full ARN of the task definition.
                containerInstances:
                  type: array
                  description: The container instance IDs or ARNs to start the task on.
                  items:
                    type: string
                overrides:
