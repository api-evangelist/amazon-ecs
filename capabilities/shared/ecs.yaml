naftiko: "1.0.0-alpha1"

info:
  label: "Amazon ECS API"
  description: "Amazon Elastic Container Service API for managing clusters, services, tasks, task definitions, and capacity providers."
  tags:
    - Amazon
    - Containers
    - Orchestration
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - type: http
      namespace: ecs
      baseUri: https://ecs.us-east-1.amazonaws.com
      description: "Amazon ECS regional API endpoint."
      authentication:
        type: apikey
        key: Authorization
        value: "{{AWS_ACCESS_KEY_ID}}"
        placement: header
      resources:
        - name: clusters
          path: /
          description: "ECS cluster management operations."
          operations:
            - name: create-cluster
              method: POST
              description: "Create a new ECS cluster."
              inputParameters:
                - name: X-Amz-Target
                  in: header
                  type: string
                  required: true
                  description: "API action target."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  clusterName: "{{tools.clusterName}}"
            - name: delete-cluster
              method: POST
              description: "Delete an ECS cluster."
              inputParameters:
                - name: X-Amz-Target
                  in: header
                  type: string
                  required: true
                  description: "API action target."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cluster: "{{tools.cluster}}"
            - name: describe-clusters
              method: POST
              description: "Describe one or more ECS clusters."
              inputParameters:
                - name: X-Amz-Target
                  in: header
                  type: string
                  required: true
                  description: "API action target."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  clusters: "{{tools.clusters}}"
            - name: list-clusters
              method: POST
              description: "List all ECS clusters."
              inputParameters:
                - name: X-Amz-Target
                  in: header
                  type: string
                  required: true
                  description: "API action target."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-cluster
              method: POST
              description: "Update cluster settings."
              inputParameters:
                - name: X-Amz-Target
                  in: header
                  type: string
                  required: true
                  description: "API action target."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cluster: "{{tools.cluster}}"
        - name: services
          path: /
          description: "ECS service management operations."
          operations:
            - name: create-service
              method: POST
              description: "Create a new ECS service."
              inputParameters:
                - name: X-Amz-Target
                  in: header
                  type: string
                  required: true
                  description: "API action target."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cluster: "{{tools.cluster}}"
                  serviceName: "{{tools.serviceName}}"
                  taskDefinition: "{{tools.taskDefinition}}"
            - name: delete-service
              method: POST
              description: "Delete an ECS service."
              inputParameters:
                - name: X-Amz-Target
                  in: header
                  type: string
                  required: true
                  description: "API action target."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cluster: "{{tools.cluster}}"
                  service: "{{tools.service}}"
            - name: describe-services
              method: POST
              description: "Describe one or more ECS services."
              inputParameters:
                - name: X-Amz-Target
                  in: header
                  type: string
                  required: true
                  description: "API action target."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cluster: "{{tools.cluster}}"
                  services: "{{tools.services}}"
            - name: list-services
              method: POST
              description: "List all services in a cluster."
              inputParameters:
                - name: X-Amz-Target
                  in: header
                  type: string
                  required: true
                  description: "API action target."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cluster: "{{tools.cluster}}"
            - name: update-service
              method: POST
              description: "Update an ECS service."
              inputParameters:
                - name: X-Amz-Target
                  in: header
                  type: string
                  required: true
                  description: "API action target."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cluster: "{{tools.cluster}}"
                  service: "{{tools.service}}"
        - name: task-definitions
          path: /
          description: "ECS task definition management."
          operations:
            - name: register-task-definition
              method: POST
              description: "Register a new task definition."
              inputParameters:
                - name: X-Amz-Target
                  in: header
                  type: string
                  required: true
                  description: "API action target."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  family: "{{tools.family}}"
                  containerDefinitions: "{{tools.containerDefinitions}}"
            - name: deregister-task-definition
              method: POST
              description: "Deregister a task definition revision."
              inputParameters:
                - name: X-Amz-Target
                  in: header
                  type: string
                  required: true
                  description: "API action target."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  taskDefinition: "{{tools.taskDefinition}}"
            - name: describe-task-definition
              method: POST
              description: "Describe a task definition."
              inputParameters:
                - name: X-Amz-Target
                  in: header
                  type: string
                  required: true
                  description: "API action target."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  taskDefinition: "{{tools.taskDefinition}}"
            - name: list-task-definitions
              method: POST
              description: "List task definition families or revisions."
              inputParameters:
                - name: X-Amz-Target
                  in: header
                  type: string
                  required: true
                  description: "API action target."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: tasks
          path: /
          description: "ECS task execution and management."
          operations:
            - name: run-task
              method: POST
              description: "Run a new task from a task definition."
              inputParameters:
                - name: X-Amz-Target
                  in: header
                  type: string
                  required: true
                  description: "API action target."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cluster: "{{tools.cluster}}"
                  taskDefinition: "{{tools.taskDefinition}}"
            - name: stop-task
              method: POST
              description: "Stop a running task."
              inputParameters:
                - name: X-Amz-Target
                  in: header
                  type: string
                  required: true
                  description: "API action target."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cluster: "{{tools.cluster}}"
                  task: "{{tools.task}}"
            - name: describe-tasks
              method: POST
              description: "Describe one or more tasks."
              inputParameters:
                - name: X-Amz-Target
                  in: header
                  type: string
                  required: true
                  description: "API action target."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cluster: "{{tools.cluster}}"
                  tasks: "{{tools.tasks}}"
            - name: list-tasks
              method: POST
              description: "List tasks in a cluster."
              inputParameters:
                - name: X-Amz-Target
                  in: header
                  type: string
                  required: true
                  description: "API action target."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cluster: "{{tools.cluster}}"
            - name: execute-command
              method: POST
              description: "Execute a command in a running container."
              inputParameters:
                - name: X-Amz-Target
                  in: header
                  type: string
                  required: true
                  description: "API action target."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cluster: "{{tools.cluster}}"
                  task: "{{tools.task}}"
                  command: "{{tools.command}}"
                  interactive: true

  exposes:
    - type: rest
      port: 8100
      namespace: ecs-api
      resources:
        - path: /v1/clusters
          name: clusters
          description: "ECS cluster operations."
          operations:
            - method: GET
              name: list-clusters
              description: "List all ECS clusters."
              call: "ecs.list-clusters"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: ecs-mcp
      transport: http
      tools:
        - name: list-clusters
          description: "List all ECS clusters in the account."
          hints:
            readOnly: true
          call: "ecs.list-clusters"
          outputParameters:
            - type: object
              mapping: "$."
        - name: describe-clusters
          description: "Describe one or more ECS clusters."
          hints:
            readOnly: true
          call: "ecs.describe-clusters"
          with:
            clusters: "tools.clusters"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-cluster
          description: "Create a new ECS cluster."
          hints:
            readOnly: false
          call: "ecs.create-cluster"
          with:
            clusterName: "tools.clusterName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-cluster
          description: "Delete an ECS cluster."
          hints:
            destructive: true
          call: "ecs.delete-cluster"
          with:
            cluster: "tools.cluster"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-services
          description: "List all services in an ECS cluster."
          hints:
            readOnly: true
          call: "ecs.list-services"
          with:
            cluster: "tools.cluster"
          outputParameters:
            - type: object
              mapping: "$."
        - name: describe-services
          description: "Describe one or more ECS services."
          hints:
            readOnly: true
          call: "ecs.describe-services"
          with:
            cluster: "tools.cluster"
            services: "tools.services"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-service
          description: "Create a new ECS service."
          hints:
            readOnly: false
          call: "ecs.create-service"
          with:
            cluster: "tools.cluster"
            serviceName: "tools.serviceName"
            taskDefinition: "tools.taskDefinition"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-service
          description: "Update an ECS service."
          hints:
            readOnly: false
            idempotent: true
          call: "ecs.update-service"
          with:
            cluster: "tools.cluster"
            service: "tools.service"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-service
          description: "Delete an ECS service."
          hints:
            destructive: true
          call: "ecs.delete-service"
          with:
            cluster: "tools.cluster"
            service: "tools.service"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-task-definitions
          description: "List task definition families or revisions."
          hints:
            readOnly: true
          call: "ecs.list-task-definitions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: describe-task-definition
          description: "Describe a task definition."
          hints:
            readOnly: true
          call: "ecs.describe-task-definition"
          with:
            taskDefinition: "tools.taskDefinition"
          outputParameters:
            - type: object
              mapping: "$."
        - name: register-task-definition
          description: "Register a new task definition."
          hints:
            readOnly: false
          call: "ecs.register-task-definition"
          with:
            family: "tools.family"
            containerDefinitions: "tools.containerDefinitions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: deregister-task-definition
          description: "Deregister a task definition revision."
          hints:
            destructive: true
          call: "ecs.deregister-task-definition"
          with:
            taskDefinition: "tools.taskDefinition"
          outputParameters:
            - type: object
              mapping: "$."
        - name: run-task
          description: "Run a new task from a task definition."
          hints:
            readOnly: false
          call: "ecs.run-task"
          with:
            cluster: "tools.cluster"
            taskDefinition: "tools.taskDefinition"
          outputParameters:
            - type: object
              mapping: "$."
        - name: stop-task
          description: "Stop a running task."
          hints:
            destructive: true
          call: "ecs.stop-task"
          with:
            cluster: "tools.cluster"
            task: "tools.task"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-tasks
          description: "List tasks in a cluster."
          hints:
            readOnly: true
          call: "ecs.list-tasks"
          with:
            cluster: "tools.cluster"
          outputParameters:
            - type: object
              mapping: "$."
        - name: describe-tasks
          description: "Describe one or more tasks."
          hints:
            readOnly: true
          call: "ecs.describe-tasks"
          with:
            cluster: "tools.cluster"
            tasks: "tools.tasks"
          outputParameters:
            - type: object
              mapping: "$."
        - name: execute-command
          description: "Execute a command in a running container."
          hints:
            readOnly: false
          call: "ecs.execute-command"
          with:
            cluster: "tools.cluster"
            task: "tools.task"
            command: "tools.command"
          outputParameters:
            - type: object
              mapping: "$."
